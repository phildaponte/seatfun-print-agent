name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        platform: [macos-latest, windows-latest]
        include:
          - platform: macos-latest
            target: aarch64-apple-darwin
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          target: ${{ matrix.target }}

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install dependencies
        run: pnpm install

      - name: Build TypeScript
        run: pnpm build

      # Temporarily disabled - golden tests need updating
      # - name: Run tests
      #   run: pnpm test

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: pnpm tauri
          args: build --target ${{ matrix.target }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.platform }}-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/nsis/*.exe
          if-no-files-found: ignore

  universal-macos:
    needs: release
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download arm64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-latest-aarch64-apple-darwin
          path: artifacts/arm64

      - name: Download x64 artifact
        uses: actions/download-artifact@v4
        with:
          name: macos-latest-x86_64-apple-darwin
          path: artifacts/x64

      - name: Create universal DMG
        run: |
          # Find the DMG files
          ARM64_DMG=$(find artifacts/arm64 -name "*.dmg" | head -1)
          X64_DMG=$(find artifacts/x64 -name "*.dmg" | head -1)
          
          if [ -z "$ARM64_DMG" ] || [ -z "$X64_DMG" ]; then
            echo "Error: Could not find DMG files"
            exit 1
          fi
          
          echo "Found arm64 DMG: $ARM64_DMG"
          echo "Found x64 DMG: $X64_DMG"
          
          # Mount both DMGs
          ARM64_MOUNT=$(hdiutil attach "$ARM64_DMG" | grep /Volumes | awk '{print $3}')
          X64_MOUNT=$(hdiutil attach "$X64_DMG" | grep /Volumes | awk '{print $3}')
          
          echo "Mounted arm64 at: $ARM64_MOUNT"
          echo "Mounted x64 at: $X64_MOUNT"
          
          # Copy arm64 app to working directory
          cp -R "$ARM64_MOUNT/SeatfunPrintAgent.app" .
          
          # Create universal binary using lipo
          lipo -create \
            "$ARM64_MOUNT/SeatfunPrintAgent.app/Contents/MacOS/SeatfunPrintAgent" \
            "$X64_MOUNT/SeatfunPrintAgent.app/Contents/MacOS/SeatfunPrintAgent" \
            -output "SeatfunPrintAgent.app/Contents/MacOS/SeatfunPrintAgent"
          
          # Update app to universal
          /usr/bin/plutil -replace CFBundleExecutable -string "SeatfunPrintAgent" SeatfunPrintAgent.app/Contents/Info.plist
          
          # Unmount DMGs
          hdiutil detach "$ARM64_MOUNT"
          hdiutil detach "$X64_MOUNT"
          
          # Create universal DMG
          hdiutil create -volname "SeatfunPrintAgent" -srcfolder SeatfunPrintAgent.app -ov -format UDZO "SeatfunPrintAgent_universal.dmg"

      - name: Upload universal artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-universal
          path: SeatfunPrintAgent_universal.dmg
          if-no-files-found: ignore
